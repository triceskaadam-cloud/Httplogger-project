name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download XposedBridgeApi
        run: |
          mkdir -p HttpLogger/app/libs
          wget -q https://github.com/MALTF/XposedBridgeAPI/raw/main/XposedBridgeApi-82.jar -O HttpLogger/app/libs/XposedBridgeApi-82.jar

      - name: Build Debug APK
        run: |
          cd HttpLogger
          chmod +x gradlew 2>/dev/null || true
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HttpLogger-debug
          path: HttpLogger/app/build/outputs/apk/debug/app-debug.apk
